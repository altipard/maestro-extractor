# https://taskfile.dev

version: "3"

vars:
  REPOSITORY: ghcr.io/daltiparmak/maestro-extractor

tasks:
  run:
    desc: Run the extractor service locally via Docker
    cmds:
      - docker run -it --rm -p 50051:50051 {{.REPOSITORY}}

  generate:
    desc: Regenerate protobuf Python files from .proto source
    cmds:
      - python -m grpc_tools.protoc -I. --python_out=. --pyi_out=. --grpc_python_out=. extractor.proto

  publish:
    desc: Build and push multi-arch Docker image
    cmds:
      - docker buildx build . --push --platform linux/amd64,linux/arm64 --tag {{.REPOSITORY}}:latest
